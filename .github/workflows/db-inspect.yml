name: DB inspect (read-only)

# Manual workflow to inspect prod DB state. Read-only.

on:
  workflow_dispatch:
    inputs:
      query_id:
        description: 'Predefined query'
        required: true
        type: choice
        options:
          - storage_buckets_and_policies
          - applied_migrations
          - row_counts
          - produce_listings_columns
          - user_profiles_check
          - web_env_check
          - service_role_upload_test
          - decode_service_role_jwt
          - upload_with_fresh_jwt

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: SSH and inspect
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -euo pipefail
            cd ~/jirisewa-docker
            QUERY_ID="${{ inputs.query_id }}"

            run_query() {
              docker compose -f docker-compose.prod.yml --env-file .env.docker exec -T db \
                psql -U postgres -d postgres -c "$1"
            }

            case "$QUERY_ID" in
              storage_buckets_and_policies)
                echo "==> Storage buckets:"
                run_query "SELECT id, name, public, file_size_limit FROM storage.buckets;"
                echo ""
                echo "==> Policies on storage.objects:"
                run_query "SELECT policyname, cmd, qual, with_check FROM pg_policies WHERE schemaname='storage' AND tablename='objects' ORDER BY policyname;"
                ;;
              applied_migrations)
                echo "==> supabase_migrations.applied (last 30 by filename desc):"
                run_query "SELECT filename, applied_at FROM supabase_migrations.applied ORDER BY filename DESC LIMIT 30;"
                ;;
              row_counts)
                run_query "
                  SELECT 'auth.users' AS tbl, COUNT(*) FROM auth.users
                  UNION ALL SELECT 'users', COUNT(*) FROM users
                  UNION ALL SELECT 'user_profiles', COUNT(*) FROM user_profiles
                  UNION ALL SELECT 'orders', COUNT(*) FROM orders
                  UNION ALL SELECT 'produce_listings', COUNT(*) FROM produce_listings
                  UNION ALL SELECT 'produce_categories', COUNT(*) FROM produce_categories
                  UNION ALL SELECT 'pickup_hubs', COUNT(*) FROM pickup_hubs;"
                ;;
              produce_listings_columns)
                run_query "
                  SELECT column_name, data_type, is_nullable, column_default
                    FROM information_schema.columns
                   WHERE table_schema='public' AND table_name='produce_listings'
                   ORDER BY ordinal_position;"
                ;;
              web_env_check)
                echo "==> Web container Supabase env (key prefixes only):"
                docker compose -f docker-compose.prod.yml --env-file .env.docker exec -T web sh -c '
                  echo "NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL";
                  echo "NEXT_PUBLIC_SUPABASE_ANON_KEY (first 20 chars)=${NEXT_PUBLIC_SUPABASE_ANON_KEY:0:20}";
                  echo "SUPABASE_SERVICE_ROLE_KEY (first 20 chars)=${SUPABASE_SERVICE_ROLE_KEY:0:20}";
                  echo "SUPABASE_SERVICE_ROLE_KEY length=${#SUPABASE_SERVICE_ROLE_KEY}";
                  echo "Are anon and service role identical? $([ \"$NEXT_PUBLIC_SUPABASE_ANON_KEY\" = \"$SUPABASE_SERVICE_ROLE_KEY\" ] && echo YES-WRONG || echo no)"
                '
                ;;
              upload_with_fresh_jwt)
                echo "==> Signing a service_role JWT with the live JWT_SECRET and uploading..."
                JWT_SECRET=$(grep -E "^JWT_SECRET=" ~/jirisewa-docker/.env.docker | head -1 | cut -d= -f2- | tr -d "\"")
                if [ -z "$JWT_SECRET" ]; then echo "JWT_SECRET not found in .env.docker"; exit 1; fi
                echo "JWT_SECRET length: ${#JWT_SECRET}"
                docker compose -f docker-compose.prod.yml --env-file .env.docker exec -T -e JWT_SECRET="$JWT_SECRET" web node -e '
                const crypto = require("crypto");
                const secret = process.env.JWT_SECRET;
                const b64url = (b) => Buffer.from(b).toString("base64").replace(/=+$/,"").replace(/\+/g,"-").replace(/\//g,"_");
                const header = b64url(JSON.stringify({alg:"HS256",typ:"JWT"}));
                const payload = b64url(JSON.stringify({iss:"supabase",role:"service_role",iat:Math.floor(Date.now()/1000),exp:Math.floor(Date.now()/1000)+3600}));
                const sig = b64url(crypto.createHmac("sha256", secret).update(header+"."+payload).digest());
                const tok = header+"."+payload+"."+sig;
                console.log("fresh JWT (truncated):", tok.slice(0,40), "...");
                fetch("https://khetbata.xyz/_supabase/storage/v1/object/produce-photos/00000000-0000-4000-a000-000000000a01/freshjwt-"+Date.now()+".txt", {
                  method: "POST",
                  headers: {
                    "Authorization": "Bearer " + tok,
                    "apikey": tok,
                    "Content-Type": "text/plain",
                  },
                  body: "test with fresh jwt",
                }).then(async r => {
                  console.log("status:", r.status);
                  console.log("body:", await r.text());
                });
                '
                ;;
              decode_service_role_jwt)
                echo "==> Decoding the SERVICE_ROLE_KEY claims (base64 payload)..."
                docker compose -f docker-compose.prod.yml --env-file .env.docker exec -T web node -e '
                const tok = process.env.SUPABASE_SERVICE_ROLE_KEY || "";
                const parts = tok.split(".");
                if (parts.length !== 3) {
                  console.log("Not a JWT (parts:", parts.length, ", first 20 chars:", tok.slice(0,20), ")");
                  console.log("Length:", tok.length);
                  process.exit(0);
                }
                const decode = (s) => JSON.parse(Buffer.from(s.replace(/-/g,"+").replace(/_/g,"/"), "base64").toString("utf8"));
                console.log("header:", decode(parts[0]));
                console.log("payload:", decode(parts[1]));
                '
                echo ""
                echo "==> Decoding the ANON key claims..."
                docker compose -f docker-compose.prod.yml --env-file .env.docker exec -T web node -e '
                const tok = process.env.NEXT_PUBLIC_SUPABASE_ANON_KEY || "";
                const parts = tok.split(".");
                if (parts.length !== 3) {
                  console.log("Not a JWT (parts:", parts.length, ", first 20 chars:", tok.slice(0,20), ")");
                  console.log("Length:", tok.length);
                  process.exit(0);
                }
                const decode = (s) => JSON.parse(Buffer.from(s.replace(/-/g,"+").replace(/_/g,"/"), "base64").toString("utf8"));
                console.log("header:", decode(parts[0]));
                console.log("payload:", decode(parts[1]));
                '
                ;;
              service_role_upload_test)
                echo "==> BUILD_ID + image label:"
                docker compose -f docker-compose.prod.yml --env-file .env.docker exec -T web cat /app/apps/web/.next/BUILD_ID
                echo ""
                echo "==> Whether deployed code has the service-role photo upload fix:"
                docker compose -f docker-compose.prod.yml --env-file .env.docker exec -T web sh -c '
                  cd /app/apps/web
                  echo "--- count of createServiceRoleClient mentions in compiled server output ---"
                  find .next/server -name "*.js" -exec grep -l "createServiceRoleClient" {} \; | wc -l
                  echo "--- look for the post-fix comment in any server chunk ---"
                  find .next/server -name "*.js" -exec grep -l "auth check above is the source of truth" {} \; | head
                  echo "--- look for uploadProducePhoto chunk ---"
                  CHUNK=$(find .next/server -name "*.js" -exec grep -l "uploadProducePhoto" {} \; | head -1)
                  echo "found chunk: $CHUNK"
                  if [ -n "$CHUNK" ]; then
                    echo "--- excerpt around uploadProducePhoto ---"
                    grep -o "uploadProducePhoto[^}]\{0,400\}" "$CHUNK" | head -2 | cut -c1-500
                  fi
                '
                echo ""
                echo "==> Service-role storage upload via Node from inside the web container..."
                docker compose -f docker-compose.prod.yml --env-file .env.docker exec -T web node -e '
                const fs = require("fs");
                const url = "https://khetbata.xyz/_supabase/storage/v1/object/produce-photos/00000000-0000-4000-a000-000000000a01/diag-" + Date.now() + ".txt";
                const key = process.env.SUPABASE_SERVICE_ROLE_KEY;
                if (!key) { console.error("missing key"); process.exit(1); }
                fetch(url, {
                  method: "POST",
                  headers: {
                    "Authorization": "Bearer " + key,
                    "apikey": key,
                    "Content-Type": "text/plain",
                  },
                  body: "diagnostic",
                }).then(async r => {
                  console.log("status:", r.status);
                  console.log("body:", await r.text());
                }).catch(e => console.error("err:", e.message));
                '
                ;;
              user_profiles_check)
                echo "==> user_profiles columns:"
                run_query "
                  SELECT column_name, data_type, is_nullable
                    FROM information_schema.columns
                   WHERE table_schema='public' AND table_name='user_profiles'
                   ORDER BY ordinal_position;"
                echo "==> user_profiles CHECK constraints:"
                run_query "
                  SELECT con.conname, pg_get_constraintdef(con.oid)
                    FROM pg_constraint con
                    JOIN pg_class rel ON rel.oid = con.conrelid
                    JOIN pg_namespace n ON n.oid = rel.relnamespace
                   WHERE n.nspname = 'public' AND rel.relname = 'user_profiles' AND con.contype='c';"
                ;;
            esac
