name: DB inspect (read-only)

# Manual workflow to inspect prod DB state. Read-only.

on:
  workflow_dispatch:
    inputs:
      query_id:
        description: 'Predefined query'
        required: true
        type: choice
        options:
          - storage_buckets_and_policies
          - applied_migrations
          - row_counts
          - produce_listings_columns
          - user_profiles_check
          - web_env_check
          - service_role_upload_test

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: SSH and inspect
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -euo pipefail
            cd ~/jirisewa-docker
            QUERY_ID="${{ inputs.query_id }}"

            run_query() {
              docker compose -f docker-compose.prod.yml --env-file .env.docker exec -T db \
                psql -U postgres -d postgres -c "$1"
            }

            case "$QUERY_ID" in
              storage_buckets_and_policies)
                echo "==> Storage buckets:"
                run_query "SELECT id, name, public, file_size_limit FROM storage.buckets;"
                echo ""
                echo "==> Policies on storage.objects:"
                run_query "SELECT policyname, cmd, qual, with_check FROM pg_policies WHERE schemaname='storage' AND tablename='objects' ORDER BY policyname;"
                ;;
              applied_migrations)
                echo "==> supabase_migrations.applied (last 30 by filename desc):"
                run_query "SELECT filename, applied_at FROM supabase_migrations.applied ORDER BY filename DESC LIMIT 30;"
                ;;
              row_counts)
                run_query "
                  SELECT 'auth.users' AS tbl, COUNT(*) FROM auth.users
                  UNION ALL SELECT 'users', COUNT(*) FROM users
                  UNION ALL SELECT 'user_profiles', COUNT(*) FROM user_profiles
                  UNION ALL SELECT 'orders', COUNT(*) FROM orders
                  UNION ALL SELECT 'produce_listings', COUNT(*) FROM produce_listings
                  UNION ALL SELECT 'produce_categories', COUNT(*) FROM produce_categories
                  UNION ALL SELECT 'pickup_hubs', COUNT(*) FROM pickup_hubs;"
                ;;
              produce_listings_columns)
                run_query "
                  SELECT column_name, data_type, is_nullable, column_default
                    FROM information_schema.columns
                   WHERE table_schema='public' AND table_name='produce_listings'
                   ORDER BY ordinal_position;"
                ;;
              web_env_check)
                echo "==> Web container Supabase env (key prefixes only):"
                docker compose -f docker-compose.prod.yml --env-file .env.docker exec -T web sh -c '
                  echo "NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL";
                  echo "NEXT_PUBLIC_SUPABASE_ANON_KEY (first 20 chars)=${NEXT_PUBLIC_SUPABASE_ANON_KEY:0:20}";
                  echo "SUPABASE_SERVICE_ROLE_KEY (first 20 chars)=${SUPABASE_SERVICE_ROLE_KEY:0:20}";
                  echo "SUPABASE_SERVICE_ROLE_KEY length=${#SUPABASE_SERVICE_ROLE_KEY}";
                  echo "Are anon and service role identical? $([ \"$NEXT_PUBLIC_SUPABASE_ANON_KEY\" = \"$SUPABASE_SERVICE_ROLE_KEY\" ] && echo YES-WRONG || echo no)"
                '
                ;;
              service_role_upload_test)
                echo "==> Whether deployed image has the service-role photo upload fix:"
                docker compose -f docker-compose.prod.yml --env-file .env.docker exec -T web sh -c '
                  cd /app
                  # The compiled server chunk for the farmer actions. Search
                  # for a string that is unique to the post-fix version (the
                  # comment we added) and the import of createServiceRoleClient
                  # in the upload action.
                  echo "--- searching for createServiceRoleClient usage in server chunks ---"
                  grep -l "createServiceRoleClient" .next/server/**/*.js 2>/dev/null | head -5
                  echo "--- searching for the post-fix comment ---"
                  grep -l "supabase-ssr.s cookie-based JWT" .next/server/**/*.js 2>/dev/null
                  grep -l "auth check above is the source of truth" .next/server/**/*.js 2>/dev/null
                  echo "--- git revision in /app (if present) ---"
                  cat .next/BUILD_ID 2>/dev/null || echo "(no BUILD_ID)"
                '
                echo ""
                echo "==> Direct upload test using wget..."
                docker compose -f docker-compose.prod.yml --env-file .env.docker exec -T web sh -c '
                  echo "test data" > /tmp/test.txt
                  TEST_PATH="00000000-0000-4000-a000-000000000a01/diag-$(date +%s).txt"
                  wget -qO /tmp/upload-resp \
                    --method=POST \
                    --header="Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
                    --header="apikey: $SUPABASE_SERVICE_ROLE_KEY" \
                    --header="Content-Type: text/plain" \
                    --body-file=/tmp/test.txt \
                    --server-response \
                    "https://khetbata.xyz/_supabase/storage/v1/object/produce-photos/$TEST_PATH" 2>&1 | head -20
                  echo "--- response body ---"
                  cat /tmp/upload-resp 2>/dev/null | head -10
                '
                ;;
              user_profiles_check)
                echo "==> user_profiles columns:"
                run_query "
                  SELECT column_name, data_type, is_nullable
                    FROM information_schema.columns
                   WHERE table_schema='public' AND table_name='user_profiles'
                   ORDER BY ordinal_position;"
                echo "==> user_profiles CHECK constraints:"
                run_query "
                  SELECT con.conname, pg_get_constraintdef(con.oid)
                    FROM pg_constraint con
                    JOIN pg_class rel ON rel.oid = con.conrelid
                    JOIN pg_namespace n ON n.oid = rel.relnamespace
                   WHERE n.nspname = 'public' AND rel.relname = 'user_profiles' AND con.contype='c';"
                ;;
            esac
